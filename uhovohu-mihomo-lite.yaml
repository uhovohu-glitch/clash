
# Proxy 分组内包含 provider1 provider2 手动节点（无Link-OUT）

# 链式代理说明：
      # 本配置的链式代理 设计为 入口 IN组 和 出口 OUT组，分开管理，提供更大灵活性
      # 你的设备 → IN组（入口） → OUT组（出口） → 互联网
      
      #
      # IN 组：你的设备直接连接的节点，在此选择 入口
      #         来源：provider1 / provider2 / 手动节点
      #
      # OUT 组：最终连接互联网的节点，在此选择 出口
      #         来源：Link-OUT 订阅中的节点
      #
      
      # 其他策略组（Apple / Netflix 等）均内置 OUT 组选项
      
      # 例：IN 选 hk01，OUT 选 tw01，Apple 组选 OUT
      # Apple 组的流量最终路径：设备 → hk01 → tw01 → 互联网
      
      # 用法一 推荐把 所有节点(包含中转与落地) 并入一个订阅链接，在 provider1 与 Link-OUT 中引用相同链接使用
      # 用法二 把中转节点放入 provider1 订阅链接，落地节点放入 Link-OUT 订阅链接，分别在 IN 与 OUT 中引用

# =======================================================
# 1. 机场订阅 Proxy Providers
# =======================================================

proxy-providers:
  provider1:                                                                                    # 订阅链接，如需多个订阅请复制整段 并修改 provider1 字段 保证唯一性
    url: "填入订阅"
    type: http
    interval: 86400
    health-check: {enable: true, lazy: true, url: "https://www.gstatic.com/generate_204",interval: 3600}
    proxy: DIRECT
  
  provider2:                                                                                    # 订阅链接，如需多个订阅请复制整段 并修改 provider2 字段 保证唯一性
    url: "填入订阅"
    type: http
    interval: 86400
    health-check: {enable: true, lazy: true, url: "https://www.gstatic.com/generate_204",interval: 3600}
    proxy: DIRECT  
  
  Link-OUT:                                                                                     # 链路出口节点订阅，请尽量使用单独的订阅链接   或 "与上方订阅链接相同"  
    url: "填入订阅"
    type: http
    interval: 86400
    health-check: {enable: true, lazy: true, url: "https://www.gstatic.com/generate_204",interval: 3600}
    proxy: DIRECT
    override:
      additional-prefix: "=> "                                                                  # 追加前缀 "=> " 以区分链路出口节点，方便在策略组中单独调用
      dialer-proxy: IN                                                                          # 关键：让这些节点在连接时自动经过 IN 组的当前选中节点


#proxies:                                                                                       # 手动节点的链式代理建议去参考官方文档填写
#  - name: "手动节点1"
#  - name: "手动节点2"


# 2. 全局参数 Global Settings
# =======================================================

# ── 系统设置 ──
mixed-port: 7890                             # 混合代理端口
allow-lan: true                              # 允许局域网连接
bind-address: "*"                            # 绑定所有网卡 IP，确保本机所有内网 IP 都能接收局域网请求
ipv6: false                                  # 关闭 IPv6 解析
log-level: warning                           # 日志级别 仅记录警告和错误，保持后台清爽并节省硬盘

# ── 分流与防封锁机制 ──
find-process-mode: "off"                     # 进程匹配模式: off 关闭进程规则/ strict 按需精准匹配/ always 强制查询耗性能
global-client-fingerprint: chrome            # 全局 TLS 指纹伪装: 伪装为正常浏览器，降低节点被墙概率 可选 chrome/ios/random 等

# ── 性能与连接优化 ──
unified-delay: true                          # 统一延迟计算方式
tcp-concurrent: true                         # 开启 TCP 并发连接，大幅加快多图网页加载速度
keep-alive-idle: 600                         # TCP 空闲 600 秒后启动保活探针
keep-alive-interval: 15                      # 保活心跳包发送间隔 15 秒

# ── 运行状态持久化 ──
profile:                                     # 记忆功能
  store-selected: true                       # 记忆手动选择的节点
  store-fake-ip: true                        # 记忆 Fake-IP 映射表

# ── Clash api ──                            # 默认注释 Nikki可取消注释使用  win mac等桌面gui客户端保持注释避免冲突
#external-controller: 0.0.0.0:9095
#secret: ""
#external-ui: ui
#external-ui-name: zashboard
#external-ui-url: "https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip"

# =======================================================
# 3. 流量嗅探 Sniffer
# =======================================================

# ── Sniffer ──
sniffer:
  enable: true                               # 核心开关 开启流量嗅探
  sniff:
    HTTP:
      ports: [80, 8080]                      # 嗅探 HTTP 协议的标准端口及常见的非标大端口
      override-destination: true             # 局部覆盖 强制用嗅探到的真实域名替换 HTTP 请求中的假 IP
    TLS:
      ports: [443]                           # 嗅探 HTTPS/TLS 加密流量，通过读取握手包中的 SNI 获取真实域名
    QUIC:
      ports: [443]                           # 嗅探 QUIC HTTP/3 协议流量
  skip-domain:                               # 嗅探豁免名 遇到以下域名直接放行不拆包，防止破坏特殊协议导致断连
    - "rule-set:R-private"                   # 局域网 / 私有域名：必须返回真实 IP，否则本地服务无法访问
    - "rule-set:R-fakeipfilter"              # 标准 Fake-IP 豁免表 NTP / STUN / 音乐 / 游戏等
    - "rule-set:R-connectivity"              # 连通性探测：返回假 IP 会导致 Windows/macOS 报断网
    - "rule-set:R-cdn-cn"                    # 国内 CDN：需要真实 IP 做就近调度
    - "rule-set:R-bank-cn"                   # 国内银行：假 IP 会触发证书校验失败
    - "rule-set:R-securities-cn"             # 国内证券
    - "rule-set:R-finance-cn"                # 国内金融
    - "rule-set:R-ntp-cn"                    # 国内 NTP：假 IP 导致时间同步失败
    - "rule-set:R-icloud-cn"                 # iCloud 国内节点 云上贵州
    - "rule-set:R-itunes-cn"                 # iTunes 国内节点
    - "rule-set:R-apple-pki"                 # Apple 证书服务
    - "rule-set:R-apple-update"              # iOS/macOS 系统更新
    - "rule-set:R-apple-cn"                  # Apple 中国专属域名
    - "rule-set:R-apple-at-cn"               # Apple 国内服务补充
    - "rule-set:R-apple-dev-cn"              # Apple 开发者国内节点
    - "rule-set:R-icloud"                    # iCloud
    - "rule-set:R-itunes"                    # iTunes
    - "rule-set:R-apple"                     # Apple 全家桶

  skip-dst-address:                          # 目的地址豁免 遇到以下 IP 地址直接放行不拆包，防止破坏特殊协议导致断连
    - "rule-set:R-sniffer-skip-ip"
    - "rule-set:R-private-ip"                # 局域网 / 私有 IP 地址列表
    - "rule-set:R-telegram-ip"               # Telegram 服务器 IP 地址列表
    - "rule-set:R-apple-ip"                  # Apple 服务器 IP 地址列表

# =======================================================
# 4. 虚拟网卡 TUN
# =======================================================
tun:
  enable: true                               # 开启 TUN 虚拟网卡
  stack: mixed                               # 混合网络栈：TCP 走 system (高性能)，UDP 走 gVisor (高兼容)
  dns-hijack: ["udp://any:53", "tcp://any:53"]   # 双重劫持标准 DNS 端口，彻底防泄漏
  #device: nikki                             #使用nikki，混入全部不修改的情况，开启接口指定为nikki
  
  #使用仅内核自行修改下面三项为true 路由控制 使用 GUI 客户端保持 false，纯内核命令行运行改为 true
  auto-route: false                          # 不自动修改系统路由表，交由外层客户端管理，防冲突
  auto-redirect: false                       # 不自动配置重定向流量规则
  auto-detect-interface: false               # 不自动探测物理出口网卡
  strict-route: false                        # 严格路由限制 开启后物理网卡被锁死，GUI 环境建议 false

# =======================================================
# 5. DNS
# =======================================================

dns:
  # ── 运行参数 ──
  enable: true                               # 开启内置 DNS 服务
  cache-algorithm: arc                       # DNS 缓存淘汰算法 ARC 相比传统 LRU 命中率更高
  listen: 0.0.0.0:1053                       # DNS 服务监听端口
  ipv6: false                                # 关闭 IPv6 解析 保持与全局设置一致
  respect-rules: true                        # DNS 请求遵循分流规则，由规则决定 DNS 查询走向而非固定出口
  prefer-h3: false                           # 优先使用 DoH/DoT 的 HTTP/3 传输，提升解析速度和稳定性

  # ── Fake-IP ──
  enhanced-mode: fake-ip                     # 开启 Fake-IP 增强模式 秒回假 IP，极大提升网络响应速度
  fake-ip-range: 198.18.0.1/16               # IANA 保留给 网络基准测试用的段（RFC 2544/6815），明确不会公网路由，安全可靠
  fake-ip-filter-mode: blacklist             # 黑名单过滤模式 名单内的域名不返回假 IP，要求真实解析

  # ── DNS ──
  default-nameserver:                        # 基础启动 用于最底层解析下方 proxy-server-nameserver 本身及代理节点的域名
    - 223.5.5.5
    - 223.6.6.6
  proxy-server-nameserver:                   # 节点专线 专职负责解析 “节点” 和 “订阅链接” 的真实 IP
    - https://223.5.5.5/dns-query
    - https://doh.pub/dns-query
  direct-nameserver:                         # 直连兜底 专职负责解析走 DIRECT 分流规则的域名
    - 223.5.5.5
    - 119.29.29.29
  nameserver:                                # 国外兜底 处理所有未知的兜底域名，防止 DNS 污染 附带节点选择强制走代理出境
    - 8.8.8.8#Proxy                          # 修改为明文dns地址，因大部分家宽不支持DoH解析，有需求的用户可以自行替换为 https://1.1.1.1/dns-query#Proxy  https://8.8.8.8/dns-query#Proxy
    #- 1.1.1.1#Proxy

  # ── DNS 分流 ──
  nameserver-policy:
    "rule-set:R-private": [system]                                      # 局域网 / 私有域名：必须返回真实 IP，否则本地服务无法访问
    "rule-set:R-fakeipfilter": [system, 223.5.5.5, 119.29.29.29]        # Fake-IP 豁免域名 → 系统 DNS，确保返回真实 IP
    "rule-set:R-connectivity": [system, 223.5.5.5, 119.29.29.29]        # 连通性检测 微软/苹果 → 系统 DNS，防止误报"无网络"
    "rule-set:R-cdn-cn": [system, 223.5.5.5, 119.29.29.29]              # 国内 CDN → 系统 DNS，获得最近节点 IP
    "rule-set:R-bank-cn": [system, 223.5.5.5, 119.29.29.29]             # 国内银行 → 系统 DNS，防止 DNS 污染导致证书异常
    "rule-set:R-securities-cn": [system, 223.5.5.5, 119.29.29.29]       # 国内证券 → 系统 DNS
    "rule-set:R-finance-cn": [system, 223.5.5.5, 119.29.29.29]          # 国内金融 → 系统 DNS
    "rule-set:R-ntp-cn": [system, 223.5.5.5, 119.29.29.29]
    
  # ── Fake-IP ──
  fake-ip-filter:
    - "rule-set:R-private"                   # 局域网 / 私有域名：必须返回真实 IP，否则本地服务无法访问
    - "rule-set:R-fakeipfilter"              # 标准 Fake-IP 豁免表 NTP / STUN / 音乐 / 游戏等
    - "rule-set:R-connectivity"              # 连通性探测：返回假 IP 会导致 Windows/macOS 报断网
    - "rule-set:R-cdn-cn"                    # 国内 CDN：需要真实 IP 做就近调度
    - "rule-set:R-bank-cn"                   # 国内银行：假 IP 会触发证书校验失败
    - "rule-set:R-securities-cn"             # 国内证券
    - "rule-set:R-finance-cn"                # 国内金融
    - "rule-set:R-ntp-cn"                    # 国内 NTP：假 IP 导致时间同步失败
     
# =======================================================
# 6. 策略组 Proxy Groups
# =======================================================

# ── 全局节点净化 排除广告 / 流量信息 / 到期时间等非节点内容 排除带有 "=>" 前缀的落地节点 ──
FilterAll: &FilterAll '^(?!.*(?:(?i)=>|群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|剩余流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|超时|收藏|福利|失联|USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author|Traffic|\d{4}-\d{2}-\d{2}|\d+G)).*$'

# ── 提取带有 "=>" 前缀的落地节点，同时排除垃圾信息 ──
FilterOut: &FilterOut '^(?=.*=>)(?!.*(?:(?i)群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|剩余流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|超时|收藏|福利|失联|USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author|Traffic|\d{4}-\d{2}-\d{2}|\d+G)).*$'

# ── 策略组 ──
proxy-groups:

  # ── 链式代理 ──
  - {name: IN,  type: select, include-all: true, filter: *FilterAll, icon: "https://raw.githubusercontent.com/uhovohu-glitch/clash/main/icons/in.png"}                                                        # 入口节点：链路第一跳，流量先进入此节点 一般是线路节点
  - {name: OUT, type: select, include-all: true, filter: *FilterOut, icon: "https://raw.githubusercontent.com/uhovohu-glitch/clash/main/icons/out.png"}                                                       # 出口节点：链路第二跳，由 入口节点 中转到 出口节点， 一般是落地节点
  
  # ── Proxy ──
  - {name: Proxy,       type: select, include-all: true, filter: *FilterAll, proxies: [OUT], icon: "https://raw.githubusercontent.com/uhovohu-glitch/clash/main/icons/proxy.png"}                             # 全部节点手动选择入口

  # ── Proxy App ──
  - {name: OpenAI,      type: select, include-all: true, filter: *FilterAll, proxies: [Proxy, DIRECT, REJECT, OUT], icon: "https://raw.githubusercontent.com/uhovohu-glitch/clash/main/icons/chatgpt.png"}    # OpenAI / ChatGPT
  - {name: Anthropic,   type: select, include-all: true, filter: *FilterAll, proxies: [Proxy, DIRECT, REJECT, OUT], icon: "https://raw.githubusercontent.com/uhovohu-glitch/clash/main/icons/claude.png"}     # Anthropic / Claude
  - {name: AI,          type: select, include-all: true, filter: *FilterAll, proxies: [Proxy, DIRECT, REJECT, OUT], icon: "https://raw.githubusercontent.com/uhovohu-glitch/clash/main/icons/ai.png"}         # AI 杂项 (Perplexity / 兜底)
  - {name: YouTube,     type: select, include-all: true, filter: *FilterAll, proxies: [Proxy, DIRECT, REJECT, OUT], icon: "https://raw.githubusercontent.com/uhovohu-glitch/clash/main/icons/youtube.png"}    # YouTube
  - {name: Google,      type: select, include-all: true, filter: *FilterAll, proxies: [Proxy, DIRECT, REJECT, OUT], icon: "https://raw.githubusercontent.com/uhovohu-glitch/clash/main/icons/google.png"}     # Google 全家桶
  - {name: GitHub,      type: select, include-all: true, filter: *FilterAll, proxies: [Proxy, DIRECT, REJECT, OUT], icon: "https://raw.githubusercontent.com/uhovohu-glitch/clash/main/icons/github.png"}     # GitHub
  - {name: Microsoft,   type: select, include-all: true, filter: *FilterAll, proxies: [DIRECT, Proxy, REJECT, OUT], icon: "https://raw.githubusercontent.com/uhovohu-glitch/clash/main/icons/microsoft.png"}  # Microsoft 全家桶
  - {name: Apple,       type: select, include-all: true, filter: *FilterAll, proxies: [DIRECT, Proxy, REJECT, OUT], icon: "https://raw.githubusercontent.com/uhovohu-glitch/clash/main/icons/apple.png"}      # Apple 全家桶

  - {name: X,           type: select, include-all: true, filter: *FilterAll, proxies: [Proxy, DIRECT, REJECT, OUT], icon: "https://raw.githubusercontent.com/uhovohu-glitch/clash/main/icons/x.png"}          # X / Twitter / 马斯克系
  - {name: Telegram,    type: select, include-all: true, filter: *FilterAll, proxies: [Proxy, DIRECT, REJECT, OUT], icon: "https://raw.githubusercontent.com/uhovohu-glitch/clash/main/icons/telegram.png"}   # Telegram

  - {name: TikTok,      type: select, include-all: true, filter: *FilterAll, proxies: [Proxy, DIRECT, REJECT, OUT], icon: "https://raw.githubusercontent.com/uhovohu-glitch/clash/main/icons/tiktok.png"}     # TikTok / 字节跳动海外
  - {name: Netflix,     type: select, include-all: true, filter: *FilterAll, proxies: [Proxy, DIRECT, REJECT, OUT], icon: "https://raw.githubusercontent.com/uhovohu-glitch/clash/main/icons/netflix.png"}    # Netflix
  - {name: Spotify,     type: select, include-all: true, filter: *FilterAll, proxies: [Proxy, DIRECT, REJECT, OUT], icon: "https://raw.githubusercontent.com/uhovohu-glitch/clash/main/icons/spotify.png"}    # Spotify
  
  - {name: Steam,       type: select, include-all: true, filter: *FilterAll, proxies: [DIRECT, Proxy, REJECT, OUT], icon: "https://raw.githubusercontent.com/uhovohu-glitch/clash/main/icons/steam.png"}      # Steam

  # ── CN / Final ──
  - {name: CN,          type: select, include-all: true, filter: *FilterAll, proxies: [DIRECT, Proxy, REJECT, OUT], icon: "https://raw.githubusercontent.com/uhovohu-glitch/clash/main/icons/cn.png"}         # 默认国内直连
  - {name: Final,       type: select, include-all: true, filter: *FilterAll, proxies: [Proxy, DIRECT, REJECT, OUT], icon: "https://raw.githubusercontent.com/uhovohu-glitch/clash/main/icons/final.png"}      # 未匹配流量

# =======================================================
# 7. 规则源 Rule Providers
# =======================================================

# ===== 锚点 Providers =====
rule-anchor:
  ip:           &ip           {type: http, behavior: ipcidr,    format: mrs,  interval: 86400, proxy: Proxy}
  domain:       &domain       {type: http, behavior: domain,    format: mrs,  interval: 86400, proxy: Proxy}
  yaml:         &yaml         {type: http, behavior: domain,    format: yaml, interval: 86400, proxy: Proxy}
  yaml-ip:      &yaml-ip      {type: http, behavior: ipcidr,    format: yaml, interval: 86400, proxy: Proxy}
  yaml-classic: &yaml-classic {type: http, behavior: classical, format: yaml, interval: 86400, proxy: Proxy}
  list-class:   &list-class   {type: http, behavior: classical, format: text, interval: 86400, proxy: Proxy}

# ===== 远程规则集 Remote Rule =====
rule-providers:

  # ══════════════════════════════════════════
  # 1.REJECT
  # ══════════════════════════════════════════
  R-icloudprivaterelay: {<<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/icloudprivaterelay.mrs"}             # iCloud私有中继 → REJECT
  R-ads:                {<<: *domain, url: "https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/main/Filters/AWAvenue-Ads-Rule-Clash.mrs"}       # 全量广告拦截 → REJECT
  R-httpdns-cn:         {<<: *yaml,   url: "https://raw.githubusercontent.com/uhovohu-glitch/clash/refs/heads/main/Rules/category-httpdns-cn.yaml"}          # 国内HTTPDNS劫持 → REJECT
  R-win-spy:            {<<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/win-spy.mrs"}                        # Windows隐私追踪 → REJECT

  # ══════════════════════════════════════════
  # 2.LAN
  # ══════════════════════════════════════════
  R-private:            {<<: *yaml,   url: "https://raw.githubusercontent.com/uhovohu-glitch/clash/refs/heads/main/Rules/private.yaml"}                      # 内网域名 → DIRECT
  R-private-ip:         {<<: *yaml-ip,url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/private.yaml"}                         # 内网IP地址 → DIRECT
