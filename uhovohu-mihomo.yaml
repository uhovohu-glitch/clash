# =======================================================
# 4. 虚拟网卡 TUN
# =======================================================
tun:
  enable: true                               # 开启 TUN 虚拟网卡
  stack: mixed                               # 混合网络栈：TCP 走 system (高性能)，UDP 走 gVisor (高兼容)
  dns-hijack: ["any:53", "tcp://any:53"]     # 双重劫持标准 DNS 端口，彻底防泄漏
  
  #device: nikki                             # 使用nikki，混入全部不修改的情况，开启接口指定为nikki
  
  #使用仅内核自行修改下面三项为true 路由控制 使用 GUI 客户端保持 false，纯内核命令行运行改为 true
  auto-route: false                          # 不自动修改系统路由表，交由外层客户端管理，防冲突
  auto-redirect: false                       # 不自动配置重定向流量规则
  auto-detect-interface: false               # 不自动探测物理出口网卡
  strict-route: false                        # 严格路由限制 开启后物理网卡被锁死，GUI 环境建议 false

# =======================================================
# 5. DNS
# =======================================================

dns:
  # ── 运行参数 ──
  enable: true                               # 开启内置 DNS 服务
  cache-algorithm: arc                       # DNS 缓存淘汰算法 ARC 相比传统 LRU 命中率更高
  listen: 0.0.0.0:1053                       # DNS 服务监听端口
  ipv6: false                                # 关闭 IPv6 解析 保持与全局设置一致
  respect-rules: true                        # DNS 请求无视底层分流规则，由下方 DNS 设定自身决定走向

  # ── Fake-IP ──
  enhanced-mode: fake-ip                     # 开启 Fake-IP 增强模式 秒回假 IP，极大提升网络响应速度
  fake-ip-range: 28.0.0.1/8                  # 假 IP 池分配网段 使用 28 网段可避免与常见局域网 192.168 冲突
  fake-ip-filter-mode: blacklist             # 黑名单过滤模式 名单内的域名不返回假 IP，要求真实解析

  # ── DNS ──
  default-nameserver:                        # 基础启动 用于最底层解析下方 proxy-server-nameserver 本身及代理节点的域名
    - 223.5.5.5
    - 119.29.29.29
  proxy-server-nameserver:                   # 节点专线 专职负责解析 “节点” 和 “订阅链接” 的真实 IP
    - https://223.5.5.5/dns-query
    - https://doh.pub/dns-query
  direct-nameserver:                         # 直连兜底 专职负责解析走 DIRECT 分流规则的域名
    - 223.5.5.5
    - 119.29.29.29
  nameserver:                                # 国外兜底 处理所有未知的兜底域名，防止 DNS 污染 附带节点选择强制走代理出境
    - https://1.1.1.1/dns-query#Proxy
    - https://8.8.8.8/dns-query#Proxy

  # ── DNS 分流 ──
  nameserver-policy:
    "rule-set:R-private": system             # 局域网 / 私有域名 → 系统 DNS 路由器，避免本地设备发现失败
    "rule-set:R-fakeipfilter": system        # Fake-IP 豁免域名 → 系统 DNS，确保返回真实 IP
    "rule-set:R-connectivity": system        # 连通性检测 微软/苹果 → 系统 DNS，防止误报"无网络"
    "rule-set:R-cdn-cn": system              # 国内 CDN → 系统 DNS，获得最近节点 IP
    "rule-set:R-bank-cn": system             # 国内银行 → 系统 DNS，防止 DNS 污染导致证书异常
    "rule-set:R-securities-cn": system       # 国内证券 → 系统 DNS
    "rule-set:R-finance-cn": system          # 国内金融 → 系统 DNS
    "rule-set:R-ntp-cn": system
    
  # ── Fake-IP ──
  fake-ip-filter:
    - "rule-set:R-private"                   # 局域网 / 私有域名：必须返回真实 IP，否则本地服务无法访问
    - "rule-set:R-fakeipfilter"              # 标准 Fake-IP 豁免表 NTP / STUN / 音乐 / 游戏等
    - "rule-set:R-connectivity"              # 连通性探测：返回假 IP 会导致 Windows/macOS 报断网
    - "rule-set:R-cdn-cn"                    # 国内 CDN：需要真实 IP 做就近调度
    - "rule-set:R-bank-cn"                   # 国内银行：假 IP 会触发证书校验失败
    - "rule-set:R-securities-cn"             # 国内证券
    - "rule-set:R-finance-cn"                # 国内金融
    - "rule-set:R-ntp-cn"                    # 国内 NTP：假 IP 导致时间同步失败
    - "rule-set:R-wechat"
    - "rule-set:R-tencent"
    - "rule-set:R-tendcloud"
    - "rule-set:R-tencent-dev"
    - "rule-set:R-aliyun"
    - "rule-set:R-aliyun-drive"
    - "rule-set:R-alibaba"
    - "rule-set:R-alibabacloud"
    - "rule-set:R-jingdong"
    - "rule-set:R-meituan"
    - "rule-set:R-icloud-cn"                 # iCloud 国内节点 云上贵州
    - "rule-set:R-itunes-cn"                 # iTunes 国内节点
    - "rule-set:R-apple-update"              # iOS/macOS 系统更新
    - "rule-set:R-apple-cn"                  # Apple 中国专属域名
    - "rule-set:R-apple-at-cn"               # Apple 国内服务补充
    - "rule-set:R-apple-dev-cn"              # Apple 开发者国内节点
    - "rule-set:R-apple-pki-cn"              # Apple 证书国内节点
    - "rule-set:R-icloud"                    # iCloud
    - "rule-set:R-itunes"                    # iTunes
    - "rule-set:R-apple"                     # Apple 全家桶

# =======================================================
# 6. 策略组 Proxy Groups
# =======================================================

# ── 地区节点匹配正则 支持国旗 / 中英文 / 地区代码 ──
FilterHK: &FilterHK '(?i)(?:🇭🇰|香港|Hong\s?Kong|\b(?:HK|HKG)\d*\b)'
FilterTW: &FilterTW '(?i)(?:🇹🇼|台湾|Tai(?:wan)?|\b(?:TW|TWN)\d*\b)'
FilterJP: &FilterJP '(?i)(?:🇯🇵|日本|川日|东京|大阪|埼玉|Japan|\b(?:JP|JPN)\d*\b)'
FilterKR: &FilterKR '(?i)(?:🇰🇷|韩国|韓|首尔|Korea|\b(?:KR|KOR)\d*\b)'
FilterSG: &FilterSG '(?i)(?:🇸🇬|新加坡|狮|Singapore|\b(?:SG|SGP)\d*\b)'
FilterUS: &FilterUS '(?i)(?:🇺🇸|美国|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|拉斯维加斯|United States|\b(?:US|USA)\d*\b)'

# ── 全局节点净化 排除广告 / 流量信息 / 到期时间等非节点内容 排除带有 "=>" 前缀的落地节点 ──
FilterAll: &FilterAll '^(?!.*(?:(?i)群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|剩余流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|超时|收藏|福利|失联|USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author|Traffic|\d{4}-\d{2}-\d{2}|\d+G|=>)).*$'

# ── 提取带有 "=>" 前缀的落地节点，同时排除垃圾信息 ──
FilterOut: &FilterOut '^(?=.*=>)(?!.*(?:(?i)群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|剩余流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|超时|收藏|福利|失联|USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author|Traffic|\d{4}-\d{2}-\d{2}|\d+G)).*$'

# ── Others节点过滤 在净化的基础上，排除已提取的常用地区节点 ──
FilterOthers: &FilterOthers '^(?!.*(?:(?i)群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|剩余流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|超时|收藏|福利|失联|USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author|Traffic|\d{4}-\d{2}-\d{2}|\d+G|🇭🇰|香港|Hong\s?Kong|\bHKG?\d*\b|🇹🇼|台湾|Taiwan?|\bTWN?\d*\b|🇯🇵|日本|川日|东京|大阪|埼玉|Japan|\bJPN?\d*\b|🇰🇷|韩国|韓|首尔|Korea|(?:KR|KOR)\d*|🇸🇬|新加坡|Singapore|\bSGP?\d*\b|🇺🇸|美国|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|拉斯维加斯|United\s?States|\bUSA?\d*\b)).*$'

proxy-groups:

  # ── 链式代理 ──
  - {name: IN,  type: select, include-all: true, filter: *FilterAll}                                                    # 入口节点：链路第一跳，流量先进入此节点 一般是线路节点
  - {name: OUT, type: select, include-all: true, filter: *FilterOut}                                                    # 出口节点：链路第二跳，由 入口节点 中转到 出口节点， 一般是落地节点
  
  # ── Proxy ──
  - {name: Proxy,       type: select, include-all: true, filter: *FilterAll, proxies: [OUT]}                            # 全部节点手动选择入口

  # ── Proxy App ──
  - {name: OpenAI,      type: select, proxies: [Proxy, DIRECT, REJECT, OUT, HK, TW, JP, KR, SG, US, OTHERS1, OTHERS2]}  # OpenAI / ChatGPT
