  - {name: Final,       type: select, proxies: [Proxy, DIRECT, REJECT, OUT, HK, TW, JP, KR, SG, US, OTHERS1, OTHERS2]}  # 未匹配流量

  # ── Regions ──
  - {name: HK,          type: select, include-all: true, filter: *FilterHK}      # 香港节点
  - {name: TW,          type: select, include-all: true, filter: *FilterTW}      # 台湾节点
  - {name: JP,          type: select, include-all: true, filter: *FilterJP}      # 日本节点
  - {name: KR,          type: select, include-all: true, filter: *FilterKR}      # 韩国节点
  - {name: SG,          type: select, include-all: true, filter: *FilterSG}      # 新加坡节点
  - {name: US,          type: select, include-all: true, filter: *FilterUS}      # 美国节点
  - {name: OTHERS1,     type: select, include-all: true, filter: *FilterOthers}  # 其他节点 A
  - {name: OTHERS2,     type: select, include-all: true, filter: *FilterOthers}  # 其他节点 B

# =======================================================
# 7. 规则源 Rule Providers
# =======================================================

# ===== 锚点 Providers =====
rule-anchor:
  ip:           &ip           {type: http, behavior: ipcidr,    format: mrs,  interval: 86400, proxy: Proxy}
  domain:       &domain       {type: http, behavior: domain,    format: mrs,  interval: 86400, proxy: Proxy}
  yaml:         &yaml         {type: http, behavior: domain,    format: yaml, interval: 86400, proxy: Proxy}
  yaml-ip:      &yaml-ip      {type: http, behavior: ipcidr,    format: yaml, interval: 86400, proxy: Proxy}
  yaml-classic: &yaml-classic {type: http, behavior: classical, format: yaml, interval: 86400, proxy: Proxy}
  list-class:   &list-class   {type: http, behavior: classical, format: text, interval: 86400, proxy: Proxy}

