#  - name: "手动节点2"

# =======================================================
# 2. 全局参数 Global Settings
# =======================================================

# ── 系统设置 ──
mixed-port: 7890                             # 混合代理端口
allow-lan: true                              # 允许局域网连接
bind-address: "*"                            # 绑定所有网卡 IP，确保本机所有内网 IP 都能接收局域网请求
ipv6: false                                  # 关闭 IPv6 解析
log-level: warning                           # 日志级别 仅记录警告和错误，保持后台清爽并节省硬盘

# ── 分流与防封锁机制 ──
find-process-mode: off                       # 进程匹配模式: off 关闭进程规则/ strict 按需精准匹配/ always 强制查询耗性能
global-client-fingerprint: chrome            # 全局 TLS 指纹伪装: 伪装为正常浏览器，降低节点被墙概率 可选 chrome/ios/random 等

# ── 性能与连接优化 ──
unified-delay: true                          # 统一延迟计算方式
tcp-concurrent: true                         # 开启 TCP 并发连接，大幅加快多图网页加载速度
keep-alive-idle: 600                         # TCP 空闲 600 秒后启动保活探针
keep-alive-interval: 15                      # 保活心跳包发送间隔 15 秒

# ── 运行状态持久化 ──
profile:                                     # 记忆功能
  store-selected: true                       # 记忆手动选择的节点
  store-fake-ip: true                        # 记忆 Fake-IP 映射表

# ── Clash api ──                            # 默认注释 Nikki可取消注释使用  win mac等桌面gui客户端保持注释避免冲突
#external-controller: 0.0.0.0:9095
#secret: ""
#external-ui: ui
#external-ui-name: zashboard
#external-ui-url: "https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip"

# =======================================================
# 3. 流量嗅探 Sniffer
# =======================================================

# ── Sniffer ──
sniffer:
  enable: true                               # 核心开关 开启流量嗅探
  sniff:
    HTTP:
      ports: [80, 8080]                      # 嗅探 HTTP 协议的标准端口及常见的非标大端口
      override-destination: true             # 局部覆盖 强制用嗅探到的真实域名替换 HTTP 请求中的假 IP
    TLS:
      ports: [443]                           # 嗅探 HTTPS/TLS 加密流量，通过读取握手包中的 SNI 获取真实域名
    QUIC:
      ports: [443]                           # 嗅探 QUIC HTTP/3 协议流量
  skip-domain:                               # 嗅探豁免名 遇到以下域名直接放行不拆包，防止破坏特殊协议导致断连
    # ── LAN ──
    - +.lan
    - +.local
    - +.localdomain
    - +.localhost
    - +.test
    - +.example
    - +.invalid
    - +.bogon
    - +.internal
